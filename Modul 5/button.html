<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-5">Demo Bootstrap Button</h2>
    
    <!-- 1. Basic Buttons -->
    <h4>1. Basic Buttons</h4>
    <div class="mb-4">
        <button type="button" class="btn btn-primary">Primary</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-danger">Danger</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-info text-white">Info</button>
        <button type="button" class="btn btn-light border">Light</button>
        <button type="button" class="btn btn-dark">Dark</button>
        <button type="button" class="btn btn-link">Link Style</button>
    </div>
    
    <!-- 2. Outline Buttons -->
    <h4>2. Outline Buttons</h4>
    <div class="mb-4">
        <button type="button" class="btn btn-outline-primary">Primary</button>
        <button type="button" class="btn btn-outline-secondary">Secondary</button>
        <button type="button" class="btn btn-outline-success">Success</button>
        <button type="button" class="btn btn-outline-danger">Danger</button>
        <button type="button" class="btn btn-outline-warning">Warning</button>
        <button type="button" class="btn btn-outline-info">Info</button>
        <button type="button" class="btn btn-outline-dark">Dark</button>
    </div>
    
    <!-- 3. Button Sizes -->
    <h4>3. Button Sizes</h4>
    <div class="mb-4">
        <button type="button" class="btn btn-primary btn-sm">Small Button</button>
        <button type="button" class="btn btn-primary">Default Button</button>
        <button type="button" class="btn btn-primary btn-lg">Large Button</button>
    </div>
    
    <!-- 4. Block / Full Width Button -->
    <h4>4. Block Button (Full Width)</h4>
    <div class="d-grid gap-2 col-6 mx-auto mb-4">
        <button class="btn btn-success" type="button">Block Button</button>
        <button class="btn btn-outline-primary" type="button">Block Outline Button</button>
    </div>
    
    <!-- 5. Disabled State -->
    <h4>5. Disabled Button</h4>
    <div class="mb-4">
        <button type="button" class="btn btn-primary" disabled>Disabled Button</button>
        <a href="#" class="btn btn-secondary disabled" tabindex="-1" role="button" aria-disabled="true">Disabled Link</a>
    </div>
    
    <!-- 6. Button Group -->
    <h4>6. Button Group</h4>
    <div class="btn-group mb-4" role="group" aria-label="Basic example">
        <button type="button" class="btn btn-primary">Left</button>
        <button type="button" class="btn btn-primary">Middle</button>
        <button type="button" class="btn btn-primary">Right</button>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
